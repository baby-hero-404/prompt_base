prompt: "Explore the 'mini-app' codebase in the workspace."

rubric:
  - name: "Evidence & Grounding"
    weight: 2
    description: "Are all claims, gems, and anti-patterns backed by specific, verified file paths and line numbers (e.g., `mini-app/src/cache.js:25`)?"
  - name: "Architecture & Patterns"
    weight: 1
    description: "Does the output analyze the architecture style and identify patterns (such as the TTL cache gem and the config singleton anti-pattern)?"
  - name: "Reading Guide & Roadmap"
    weight: 1
    description: "Does the output include a level-based reading guide (L0-L5) and learning roadmap?"
  - name: "Applied Takeaways"
    weight: 1
    description: "Does the report include concrete, prioritized takeaways mapped to a destination stack?"

